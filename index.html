<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SV Operations Schedule</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 30px;
    }

    .event {
      background: white;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .date {
      font-weight: bold;
      color: #444;
      margin-bottom: 8px;
    }

    .title {
      font-size: 18px;
    }
  </style>
</head>

<body>
  <h1>SV Operations Schedule</h1>

  <div id="events"></div>

  <script>
    async function loadSchedule() {
      const response = await fetch('./schedule.json');
      const events = await response.json();

      const container = document.getElementById('events');

      events.sort((a, b) => {
        return new Date(a.start) - new Date(b.start);
      });

      events.forEach(event => {
        const div = document.createElement('div');
        div.className = 'event';

        div.innerHTML = `
          <div class="date">${event.start}</div>
          <div class="title">${event.title}</div>
        `;

        container.appendChild(div);
      });
    }

    loadSchedule();
  </script>
</body>
</html>
