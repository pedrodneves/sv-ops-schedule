<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>SV Operations Schedule</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #03030a;
      --card: #120b25;
      --purple: #7c4dff;
      --purple-soft: #c99cff;
      --yellow: #f3ea4e;
      --text: #f7f4ff;
      --muted: #cdb8ef;
      --border: #7c4dff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,77,255,0.22), transparent 35%),
        linear-gradient(180deg, #03030a 0%, #070711 100%);
      color: var(--text);
      padding: 32px 24px;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: center;
      margin-bottom: 28px;
    }

    .brand {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .logo {
      width: 72px;
      height: 72px;
      border: 1px solid var(--purple);
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 34px;
      background: linear-gradient(145deg, #1b1036, #080812);
      box-shadow: 0 0 28px rgba(124,77,255,0.25);
    }

    h1 {
      margin: 0;
      font-size: 38px;
      letter-spacing: -1px;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 8px;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(27,16,54,0.95), rgba(8,8,18,0.95));
      padding: 22px;
      box-shadow: 0 0 32px rgba(124,77,255,0.16);
      margin-bottom: 24px;
    }

    .controls {
      display: grid;
      grid-template-columns: auto auto auto 1fr auto;
      gap: 12px;
      align-items: center;
    }

    button, input, .button {
      background: #0c0a18;
      border: 1px solid rgba(201,156,255,0.45);
      color: var(--text);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
    }

    button {
      cursor: pointer;
    }

    input::placeholder {
      color: #9b8bb7;
    }

    .button {
      color: var(--yellow);
      border-color: var(--yellow);
      text-decoration: none;
      white-space: nowrap;
      box-shadow: 0 0 20px rgba(243,234,78,0.18);
    }

    .month-title {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      margin: 24px 0;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }

    .weekday {
      color: var(--yellow);
      font-weight: 800;
      text-align: center;
      font-size: 14px;
      letter-spacing: 0.08em;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .day {
      min-height: 240px;
      border: 1px solid rgba(124,77,255,0.7);
      border-radius: 14px;
      background:
        radial-gradient(circle at top left, rgba(124,77,255,0.18), transparent 45%),
        linear-gradient(135deg, #1a0f34, #070812);
      padding: 12px;
      overflow: hidden;
    }

    .day.outside {
      opacity: 0.35;
    }

    .day.today {
      border-color: var(--yellow);
      box-shadow: 0 0 18px rgba(243,234,78,0.25);
    }

    .day-number {
      font-weight: 800;
      color: var(--purple-soft);
      margin-bottom: 8px;
    }

.event {
  background: rgba(124,77,255,0.18);
  border: 1px solid rgba(201,156,255,0.30);
  color: var(--text);
  border-radius: 10px;
  padding: 12px;
  font-size: 15px;
  line-height: 1.5;
  margin-bottom: 8px;
  white-space: pre-wrap;
  word-break: normal;
  overflow-wrap: break-word;
}

    .meta {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      margin-top: 20px;
      font-size: 14px;
    }

    footer {
      margin-top: 28px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 850px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .calendar, .weekdays {
        gap: 6px;
      }

      .day {
        min-height: 110px;
        padding: 8px;
      }

      .event {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <div class="brand">
        <div class="logo">📅</div>
        <div>
          <h1>SV Operations Schedule</h1>
          <div class="subtitle">Public monthly calendar generated from the source doc.</div>
        </div>
      </div>
    </header>

    <section class="panel">
      <div class="controls">
        <button onclick="previousMonth()">← Previous</button>
        <button onclick="goToday()">Today</button>
        <button onclick="nextMonth()">Next →</button>
        <input id="search" placeholder="Search events..." />
        <a class="button" href="./schedule.ics">Subscribe / Download ICS</a>
      </div>
    </section>

    <div class="month-title" id="monthTitle"></div>

    <div class="weekdays">
      <div class="weekday">MON</div>
      <div class="weekday">TUE</div>
      <div class="weekday">WED</div>
      <div class="weekday">THU</div>
      <div class="weekday">FRI</div>
      <div class="weekday">SAT</div>
      <div class="weekday">SUN</div>
    </div>

    <main class="calendar" id="calendar"></main>

    <div class="meta">
      <div id="updated">↻ Loading schedule...</div>
      <div>● Auto-updates hourly</div>
    </div>

    <footer>
      Questions or issues? Contact the operations team.
    </footer>
  </div>

  <script>
    let allEvents = [];
    let currentDate = new Date();

    async function loadSchedule() {
      const response = await fetch('./schedule.json?cache=' + Date.now());
      allEvents = await response.json();

      document.getElementById('updated').textContent =
        '↻ Last loaded: ' + new Date().toLocaleString();

      renderCalendar();
    }

    function dateKey(date) {
      return date.getFullYear() + '-' +
        String(date.getMonth() + 1).padStart(2, '0') + '-' +
        String(date.getDate()).padStart(2, '0');
    }

    function renderCalendar() {
      const calendar = document.getElementById('calendar');
      const search = document.getElementById('search').value.toLowerCase();

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      document.getElementById('monthTitle').textContent =
        currentDate.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);

      let mondayStartOffset = firstDay.getDay() - 1;
      if (mondayStartOffset < 0) mondayStartOffset = 6;

      const gridStart = new Date(firstDay);
      gridStart.setDate(firstDay.getDate() - mondayStartOffset);

      calendar.innerHTML = '';

      for (let i = 0; i < 42; i++) {
        const dayDate = new Date(gridStart);
        dayDate.setDate(gridStart.getDate() + i);

        const key = dateKey(dayDate);
        const todayKey = dateKey(new Date());

        const dayEvents = allEvents.filter(event => {
          const title = String(event.title || '').toLowerCase();
          const start = String(event.start || '');
          return start === key && title.includes(search);
        });

        const day = document.createElement('div');
        day.className = 'day';

        if (dayDate.getMonth() !== month) {
          day.classList.add('outside');
        }

        if (key === todayKey) {
          day.classList.add('today');
        }

        day.innerHTML = `<div class="day-number">${dayDate.getDate()}</div>`;

        dayEvents.forEach(event => {
          const eventDiv = document.createElement('div');
          eventDiv.className = 'event';
          eventDiv.textContent = event.title;
          day.appendChild(eventDiv);
        });

        calendar.appendChild(day);
      }
    }

    function previousMonth() {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    }

    function nextMonth() {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    }

    function goToday() {
      currentDate = new Date();
      renderCalendar();
    }

    document.getElementById('search').addEventListener('input', renderCalendar);

    loadSchedule();
  </script>
</body>
</html>
